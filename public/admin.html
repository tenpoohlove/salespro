<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ページ｜Pitch Navi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222e; --border: #2d2d3d;
      --accent: #7c3aed; --accent2: #a855f7; --accent3: #c084fc;
      --green: #22c55e; --red: #ef4444;
      --text: #e2e8f0; --text-muted: #94a3b8; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    header { background: linear-gradient(135deg, #1a0533 0%, #0f0f1a 100%); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    header h1 { font-size: 16px; font-weight: 700; background: linear-gradient(90deg, #c084fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .badge { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.4); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #fca5a5; }
    .spacer { flex: 1; }
    .btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
    .btn-tool { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); }
    .btn-tool:hover { border-color: var(--accent2); color: var(--accent3); }
    .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .btn-logout:hover { border-color: var(--red); color: #fca5a5; }
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; flex: 1; min-width: 130px; }
    .stat-num { font-size: 28px; font-weight: 700; color: var(--accent3); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar h2 { font-size: 15px; font-weight: 600; }
    .search-input { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; color: var(--text); font-size: 13px; outline: none; width: 220px; }
    .search-input:focus { border-color: var(--accent2); }
    .btn-csv { background: var(--green); color: white; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; }
    .btn-csv:hover { filter: brightness(1.1); }
    table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    th { background: var(--surface2); padding: 12px 16px; font-size: 12px; color: var(--text-muted); text-align: left; font-weight: 600; white-space: nowrap; }
    td { padding: 12px 16px; font-size: 13px; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(124,58,237,0.05); }
    .badge-enabled { background: rgba(34,197,94,0.15); color: #86efac; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
    .badge-disabled { background: rgba(239,68,68,0.15); color: #fca5a5; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
    .badge-admin { background: rgba(124,58,237,0.2); color: var(--accent3); border-radius: 20px; padding: 2px 10px; font-size: 11px; }
    .btn-toggle { padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid; transition: all 0.15s; }
    .btn-toggle.enable { border-color: rgba(34,197,94,0.5); color: #86efac; background: rgba(34,197,94,0.1); }
    .btn-toggle.enable:hover { background: rgba(34,197,94,0.2); }
    .btn-toggle.disable { border-color: rgba(239,68,68,0.5); color: #fca5a5; background: rgba(239,68,68,0.1); }
    .btn-toggle.disable:hover { background: rgba(239,68,68,0.2); }
    .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .nav-card { display: flex; align-items: center; gap: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; cursor: pointer; transition: all 0.15s; }
    .nav-card:hover { border-color: var(--accent2); background: rgba(124,58,237,0.06); }
    .nav-card-icon { font-size: 28px; flex-shrink: 0; }
    .nav-card-body { flex: 1; }
    .nav-card-title { font-size: 15px; font-weight: 600; }
    .nav-card-desc { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .nav-card-arrow { font-size: 20px; color: var(--accent3); }
    .settings-card { margin-top: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; }
    .settings-card h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .settings-card .desc { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.6; }
    .smtp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 660px; }
    .smtp-grid label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--text-muted); }
    .smtp-grid input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; outline: none; }
    .smtp-grid input:focus { border-color: var(--accent2); }
    .smtp-actions { margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
    @media (max-width: 560px) { .smtp-grid { grid-template-columns: 1fr; } }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 700px) { th:nth-child(3), td:nth-child(3) { display: none; } }
  </style>
</head>
<body>
  <header>
    <div class="logo-icon" onclick="location.href='/'" style="cursor:pointer;" title="トップへ">📈</div>
    <h1 onclick="location.href='/'" style="cursor:pointer;" title="トップへ">Pitch Navi</h1>
    <span class="badge">管理者</span>
    <div class="spacer"></div>
    <button class="btn-sm btn-tool" onclick="location.href='/'">ツールを使う</button>
    <button class="btn-sm btn-logout" id="logoutBtn">ログアウト</button>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card"><div class="stat-num" id="totalCount">-</div><div class="stat-label">総ユーザー数</div></div>
      <div class="stat-card"><div class="stat-num" id="enabledCount">-</div><div class="stat-label">有効ユーザー</div></div>
      <div class="stat-card"><div class="stat-num" id="disabledCount">-</div><div class="stat-label">無効ユーザー</div></div>
    </div>

    <div class="nav-card" onclick="location.href='/admin-users.html'">
      <div class="nav-card-icon">👥</div>
      <div class="nav-card-body">
        <div class="nav-card-title">登録ユーザー一覧</div>
        <div class="nav-card-desc">ユーザーの検索・認証切替・有効/無効・削除・CSV出力はこちら</div>
      </div>
      <div class="nav-card-arrow">→</div>
    </div>

    <div class="settings-card">
      <h2>✉️ メール送信設定（SMTP）</h2>
      <p class="desc">
        新規登録時の「確認メール」の差出人です。Gmailを使う場合は、通常のパスワードではなく
        <a href="https://myaccount.google.com/apppasswords" target="_blank" style="color:var(--accent3);">アプリパスワード</a>
        を発行して入力してください（ホスト: <code>smtp.gmail.com</code> / ポート: <code>587</code>）。
      </p>
      <div id="smtpMsg" style="display:none; font-size:13px; margin-bottom:14px;"></div>
      <div style="margin-bottom:16px;">
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:7px;">メールサービスを選ぶとホスト・ポートを自動入力します</div>
        <div id="smtpPresets" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
      </div>
      <div class="smtp-grid">
        <label>SMTPホスト<input id="smtpHost" placeholder="smtp.gmail.com"></label>
        <label>ポート<input id="smtpPort" placeholder="587"></label>
        <label>ユーザー（メールアドレス）<input id="smtpUser" placeholder="you@gmail.com" autocomplete="off"></label>
        <label>パスワード（アプリパスワード）<input id="smtpPass" type="password" placeholder="アプリパスワード" autocomplete="new-password"></label>
        <label>差出人の表示名<input id="smtpFromName" placeholder="Pitch Navi"></label>
      </div>
      <div class="smtp-actions">
        <button class="btn-csv" onclick="saveSmtp()" style="background:var(--accent);">保存</button>
        <button class="btn-csv" onclick="testSmtp()" style="background:#475569;">テスト送信</button>
      </div>
    </div>
  </div>

  <script>
    async function init() {
      const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
      if (!me || !me.isAdmin) { location.href = '/login.html'; return; }

      document.getElementById('logoutBtn').onclick = async () => {
        await fetch('/api/auth/logout', { method: 'POST' });
        location.href = '/login.html';
      };

      await loadStats();
      await loadSmtp();
    }

    async function loadStats() {
      const r = await fetch('/api/admin/users');
      if (!r.ok) return;
      const users = await r.json();
      document.getElementById('totalCount').textContent = users.length;
      document.getElementById('enabledCount').textContent = users.filter(u => u.enabled).length;
      document.getElementById('disabledCount').textContent = users.filter(u => !u.enabled).length;
    }

    // ── SMTP設定 ──
    const SMTP_PRESETS = {
      'Gmail':             { host: 'smtp.gmail.com',        port: '587' },
      'Yahoo!メール':      { host: 'smtp.mail.yahoo.co.jp', port: '587' },
      'Outlook / Hotmail': { host: 'smtp.office365.com',    port: '587' },
      'その他（手動入力）': { host: '',                       port: '587' },
    };

    function renderSmtpPresets() {
      const wrap = document.getElementById('smtpPresets');
      const current = document.getElementById('smtpHost').value.trim();
      const active = Object.entries(SMTP_PRESETS).find(([, v]) => v.host && v.host === current)?.[0]
        || (current ? 'その他（手動入力）' : 'Gmail');
      wrap.innerHTML = Object.keys(SMTP_PRESETS).map(name => {
        const on = name === active;
        return `<button class="btn-sm ${on ? '' : 'btn-tool'}"
          style="${on ? 'background:var(--accent);color:#fff;' : ''}"
          onclick="selectSmtpPreset('${name.replace(/'/g, "\\'")}')">${name}</button>`;
      }).join('');
    }

    function selectSmtpPreset(name) {
      const p = SMTP_PRESETS[name];
      const manual = name === 'その他（手動入力）';
      const hostEl = document.getElementById('smtpHost');
      const portEl = document.getElementById('smtpPort');
      if (!manual) { hostEl.value = p.host; portEl.value = p.port; }
      hostEl.readOnly = !manual;
      portEl.readOnly = !manual;
      hostEl.style.opacity = manual ? '1' : '0.6';
      portEl.style.opacity = manual ? '1' : '0.6';
      if (manual && !hostEl.value) hostEl.focus();
      renderSmtpPresets();
    }

    async function loadSmtp() {
      try {
        const r = await fetch('/api/admin/smtp');
        if (!r.ok) return;
        const d = await r.json();
        document.getElementById('smtpHost').value = d.host || '';
        document.getElementById('smtpPort').value = d.port || '587';
        document.getElementById('smtpUser').value = d.user || '';
        document.getElementById('smtpFromName').value = d.fromName || 'Pitch Navi';
        document.getElementById('smtpPass').placeholder = d.hasPassword ? '設定済み（変更する場合のみ入力）' : 'アプリパスワード';
      } catch {}
      // 現在のホストに合うプリセットを選択状態にする（手動なら入力欄を編集可に）
      const host = document.getElementById('smtpHost').value.trim();
      const matched = Object.entries(SMTP_PRESETS).find(([, v]) => v.host && v.host === host)?.[0];
      selectSmtpPreset(matched || (host ? 'その他（手動入力）' : 'Gmail'));
    }

    function smtpMsg(text, ok) {
      const el = document.getElementById('smtpMsg');
      el.textContent = text;
      el.style.display = 'block';
      el.style.color = ok ? 'var(--green)' : 'var(--red)';
    }

    async function saveSmtp() {
      const body = {
        host: document.getElementById('smtpHost').value.trim(),
        port: document.getElementById('smtpPort').value.trim(),
        user: document.getElementById('smtpUser').value.trim(),
        password: document.getElementById('smtpPass').value,
        fromName: document.getElementById('smtpFromName').value.trim(),
      };
      try {
        const r = await fetch('/api/admin/smtp', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (r.ok) {
          smtpMsg('✅ 保存しました', true);
          document.getElementById('smtpPass').value = '';
          loadSmtp();
        } else {
          smtpMsg('❌ 保存に失敗しました', false);
        }
      } catch {
        smtpMsg('❌ ネットワークエラーが発生しました', false);
      }
    }

    async function testSmtp() {
      smtpMsg('⏳ テスト送信中...', true);
      try {
        const r = await fetch('/api/admin/smtp/test', { method: 'POST' });
        const d = await r.json();
        if (r.ok && d.ok) {
          smtpMsg('✅ テストメールを ' + d.sentTo + ' に送信しました。受信トレイ（と迷惑メール）をご確認ください', true);
        } else {
          smtpMsg('❌ ' + (d.error || '送信に失敗しました'), false);
        }
      } catch {
        smtpMsg('❌ ネットワークエラーが発生しました', false);
      }
    }

    init();
  </script>
</body>
</html>
