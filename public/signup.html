<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録｜Pitch Navi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2d2d3d;
      --accent: #7c3aed; --accent2: #a855f7; --accent3: #c084fc;
      --text: #e2e8f0; --text-muted: #94a3b8;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px 36px; width: 100%; max-width: 440px; }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon { width: 52px; height: 52px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 26px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #c084fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
    label .req { color: #f87171; margin-left: 2px; }
    input { width: 100%; background: #0f0f13; border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--accent2); }
    .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
    .btn:hover { background: var(--accent2); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.4); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fca5a5; margin-bottom: 16px; display: none; }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
    .link a { color: var(--accent3); text-decoration: none; }
    .link a:hover { text-decoration: underline; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-box { display: none; text-align: center; padding: 8px 0; }
    .success-icon { font-size: 48px; margin-bottom: 16px; }
    .success-title { font-size: 18px; font-weight: 700; color: #4ade80; margin-bottom: 8px; }
    .success-desc { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .success-email { color: var(--accent3); font-weight: 600; }
    .resend-link { margin-top: 20px; font-size: 13px; color: var(--text-muted); }
    .resend-link button { background: none; border: none; color: var(--accent3); cursor: pointer; font-size: 13px; text-decoration: underline; padding: 0; }
    .resend-link button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📈</div>
      <h1>新規登録</h1>
      <p class="subtitle">Pitch Navi</p>
    </div>
    <div class="error" id="errMsg"></div>
    <div class="success-box" id="successBox">
      <div class="success-icon">📧</div>
      <div class="success-title">確認メールを送信しました</div>
      <p class="success-desc">
        <span class="success-email" id="sentEmail"></span> に<br>
        確認メールをお送りしました。<br>
        メール内のリンクをクリックして<br>登録を完了してください。
      </p>
      <p class="success-desc" style="margin-top:12px;font-size:12px;">迷惑メールフォルダもご確認ください。</p>
      <div class="resend-link">
        届かない場合は <button id="resendBtn" type="button">再送信</button>
      </div>
    </div>
    <form id="signupForm">
      <div class="form-group">
        <label>お名前<span class="req">*</span></label>
        <input type="text" id="name" placeholder="山田 太郎" required autocomplete="name">
      </div>
      <div class="form-group">
        <label>メールアドレス<span class="req">*</span></label>
        <input type="email" id="email" placeholder="example@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>電話番号<span class="req">*</span></label>
        <input type="tel" id="phone" placeholder="09012345678" required autocomplete="tel">
      </div>
      <div class="form-group">
        <label>パスワード<span class="req">*</span></label>
        <input type="password" id="password" placeholder="8文字以上" required autocomplete="new-password">
        <p class="hint">8文字以上で入力してください</p>
      </div>
      <div class="form-group">
        <label>パスワード（確認）<span class="req">*</span></label>
        <input type="password" id="password2" placeholder="パスワードを再入力" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="submitBtn">登録してはじめる</button>
    </form>
    <div class="link">すでにアカウントをお持ちの方は <a href="/login.html">ログイン</a></div>
  </div>

  <script>
    fetch('/api/auth/me').then(r => { if (r.ok) location.href = '/'; });

    let registeredEmail = '';

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errMsg');
      err.style.display = 'none';

      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      if (password !== password2) {
        err.textContent = 'パスワードが一致しません';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>登録中...';

      try {
        const email = document.getElementById('email').value.trim();
        const r = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value.trim(),
            email,
            phone: document.getElementById('phone').value.trim(),
            password,
          }),
        });
        const d = await r.json();
        if (r.ok) {
          if (d.needsVerification) {
            registeredEmail = email;
            document.getElementById('sentEmail').textContent = email;
            document.getElementById('signupForm').style.display = 'none';
            document.querySelector('.link').style.display = 'none';
            document.getElementById('successBox').style.display = 'block';
          } else {
            location.href = '/';
          }
        } else {
          err.textContent = d.error;
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = '登録してはじめる';
        }
      } catch {
        err.textContent = 'ネットワークエラーが発生しました';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '登録してはじめる';
      }
    });

    document.getElementById('resendBtn').addEventListener('click', async () => {
      const btn = document.getElementById('resendBtn');
      btn.disabled = true;
      btn.textContent = '送信中...';
      try {
        await fetch('/api/auth/resend-verification', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: registeredEmail }),
        });
        btn.textContent = '送信しました';
        setTimeout(() => { btn.disabled = false; btn.textContent = '再送信'; }, 30000);
      } catch {
        btn.disabled = false;
        btn.textContent = '再送信';
      }
    });
  </script>
</body>
</html>
